workflows:
    ios-ipa:
        name: iOS Build IPA
        max_build_duration: 240
        environment:
            vars:
                COCOS_VERSION: "2.2.2"
                CONFIGURATION: "Release"
                BUNDLE_ID: "com.xiuxian.game"
            groups:
                - default
        scripts:
            - name: Download and install Cocos Creator
              script: |
                set -e
                COCOS_APP_TARGET="/Applications/CocosCreator.app"

                # 如果已存在就跳过安装（缓存命中）
                if [ -d "$COCOS_APP_TARGET" ]; then
                    echo "=== Cocos Creator already installed, skipping download ==="
                    COCOS_PATH=$(find "$COCOS_APP_TARGET/Contents/MacOS/" -maxdepth 1 -type f | head -1)
                    echo "COCOS_PATH=$COCOS_PATH" >> $CM_ENV
                    echo "Cocos path: $COCOS_PATH"
                    exit 0
                fi

                echo "=== Downloading Cocos Creator ${COCOS_VERSION} ==="
                # 尝试多个镜像源
                DOWNLOAD_SUCCESS=0
                
                # 镜像 1：官方源
                echo "Trying official source..."
                if curl -L -o /tmp/cocos.dmg \
                    "https://digitalocean.cocos2d-x.org/CocosCreator/v2.2.2/CocosCreator_v2.2.2_20191227_mac.dmg" \
                    --retry 2 --retry-delay 3 --connect-timeout 30 --max-time 600 -k 2>/dev/null; then
                    DOWNLOAD_SUCCESS=1
                fi

                # 镜像 2：Cocos 官方 CDN
                if [ $DOWNLOAD_SUCCESS -eq 0 ]; then
                    echo "Trying Cocos CDN..."
                    if curl -L -o /tmp/cocos.dmg \
                        "http://cocos2d-x.org/filedown/CocosCreator_v2.2.2_20191227_mac.dmg" \
                        --retry 2 --retry-delay 3 --connect-timeout 30 --max-time 600 2>/dev/null; then
                        DOWNLOAD_SUCCESS=1
                    fi
                fi

                # 镜像 3：GitHub Release（如果有）
                if [ $DOWNLOAD_SUCCESS -eq 0 ]; then
                    echo "ERROR: All download sources failed"
                    exit 1
                fi

                echo "Download successful!"
                ls -lh /tmp/cocos.dmg

                echo "=== Mounting dmg ==="
                hdiutil attach /tmp/cocos.dmg -nobrowse -quiet
                sleep 3

                echo "=== Looking for Cocos app ==="
                COCOS_APP=$(find /Volumes/ -maxdepth 3 -name "*.app" 2>/dev/null | grep -i cocos | head -1)
                if [ -z "$COCOS_APP" ]; then
                    echo "ERROR: Cannot find Cocos Creator app in mounted volume"
                    ls -la /Volumes/
                    exit 1
                fi
                echo "Found: $COCOS_APP"

                echo "=== Copying to Applications ==="
                cp -R "$COCOS_APP" /Applications/

                echo "=== Unmounting dmg ==="
                VOLUME_PATH=$(dirname "$COCOS_APP")
                hdiutil detach "$VOLUME_PATH" -quiet || true
                rm -f /tmp/cocos.dmg

                echo "=== Finding Cocos executable ==="
                COCOS_PATH=$(find "$COCOS_APP_TARGET/Contents/MacOS/" -maxdepth 1 -type f | head -1)
                if [ -z "$COCOS_PATH" ]; then
                    echo "ERROR: Cannot find Cocos Creator executable"
                    ls "$COCOS_APP_TARGET/Contents/MacOS/"
                    exit 1
                fi
                echo "COCOS_PATH=$COCOS_PATH" >> $CM_ENV
                echo "=== Cocos Creator installed: $COCOS_PATH ==="

            - name: Build iOS with Cocos Creator
              script: |
                set -e
                echo "=== Starting Cocos Creator iOS build ==="
                echo "Project path: $CM_BUILD_DIR"
                echo "Cocos path: $COCOS_PATH"
                echo "Start time: $(date)"

                # 关键：防止 GUI 弹窗交互阻塞
                export DISPLAY=""
                export QT_QPA_PLATFORM="offscreen"

                # 后台运行 Cocos Creator，并设置 90 分钟超时
                "$COCOS_PATH" \
                    --path "$CM_BUILD_DIR" \
                    --build "platform=ios;debug=false;template=default;md5Cache=false;encryptJs=true;xxteaKey=df124dde-c814-4b" \
                    < /dev/null \
                    > /tmp/cocos-build.log 2>&1 &

                COCOS_PID=$!
                echo "Cocos Creator PID: $COCOS_PID"

                # 每 60 秒打印一次日志，最多等待 90 分钟
                TIMEOUT=5400
                ELAPSED=0
                while kill -0 $COCOS_PID 2>/dev/null; do
                    sleep 60
                    ELAPSED=$((ELAPSED + 60))
                    echo "=== Still building... ${ELAPSED}s elapsed ==="
                    tail -5 /tmp/cocos-build.log 2>/dev/null || true
                    if [ $ELAPSED -ge $TIMEOUT ]; then
                        echo "ERROR: Cocos Creator build timed out after ${TIMEOUT}s"
                        kill -9 $COCOS_PID 2>/dev/null || true
                        cat /tmp/cocos-build.log
                        exit 1
                    fi
                done

                wait $COCOS_PID
                EXIT_CODE=$?
                echo "=== Cocos Creator finished with exit code: $EXIT_CODE ==="
                cat /tmp/cocos-build.log

                if [ $EXIT_CODE -ne 0 ]; then
                    echo "ERROR: Cocos Creator build failed"
                    exit 1
                fi

                echo "End time: $(date)"
                echo "=== Build completed, listing output ==="
                find "$CM_BUILD_DIR/build" -name "*.xcodeproj" -maxdepth 6 2>/dev/null || echo "No xcodeproj found"
                ls -la "$CM_BUILD_DIR/build/" 2>/dev/null || echo "No build directory"

            - name: Locate Xcode project
              script: |
                set -e
                echo "=== Searching for Xcode project ==="

                PROJECT_FILE=$(find "$CM_BUILD_DIR/build" -name "*.xcodeproj" -maxdepth 6 | head -1)
                if [ -z "$PROJECT_FILE" ]; then
                    echo "ERROR: No Xcode project found"
                    ls -la "$CM_BUILD_DIR/build/" 2>/dev/null
                    find "$CM_BUILD_DIR/build" -maxdepth 6 -type d 2>/dev/null
                    exit 1
                fi
                echo "XCODE_PROJECT=$PROJECT_FILE" >> $CM_ENV
                echo "Found: $PROJECT_FILE"

                echo "=== Listing available schemes ==="
                xcodebuild -project "$PROJECT_FILE" -list 2>/dev/null || true

                SCHEME_NAME=$(xcodebuild -project "$PROJECT_FILE" -list 2>/dev/null | grep -A 10 "Schemes:" | grep -v "Schemes:" | grep -v "^$" | head -1 | sed 's/^[[:space:]]*//')
                if [ -z "$SCHEME_NAME" ]; then
                    SCHEME_NAME="hall_split-mobile"
                fi
                echo "XCODE_SCHEME=$SCHEME_NAME" >> $CM_ENV
                echo "Using scheme: $SCHEME_NAME"

            - name: Inject permissions and keys
              script: |
                set -e
                INFO_PLIST=$(find "$CM_BUILD_DIR/build" -name "Info.plist" -maxdepth 8 | grep -i "ios\|mobile" | head -1)
                if [ -z "$INFO_PLIST" ]; then
                    INFO_PLIST=$(find "$CM_BUILD_DIR/build" -name "Info.plist" -maxdepth 8 | head -1)
                fi
                echo "Info.plist: $INFO_PLIST"

                if [ ! -f "$INFO_PLIST" ]; then
                    echo "WARNING: Info.plist not found, skipping"
                    exit 0
                fi

                /usr/libexec/PlistBuddy -c "Add :NSLocationWhenInUseUsageDescription string 用于高德地图定位服务" "$INFO_PLIST" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Set :NSLocationWhenInUseUsageDescription 用于高德地图定位服务" "$INFO_PLIST"

                /usr/libexec/PlistBuddy -c "Add :NSLocationAlwaysAndWhenInUseUsageDescription string 用于后台高德地图定位服务" "$INFO_PLIST" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Set :NSLocationAlwaysAndWhenInUseUsageDescription 用于后台高德地图定位服务" "$INFO_PLIST"

                /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 需要使用相机功能" "$INFO_PLIST" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 需要使用相机功能" "$INFO_PLIST"

                /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 需要访问相册" "$INFO_PLIST" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryUsageDescription 需要访问相册" "$INFO_PLIST"

                /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 需要保存图片到相册" "$INFO_PLIST" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Set :NSPhotoLibraryAddUsageDescription 需要保存图片到相册" "$INFO_PLIST"

                /usr/libexec/PlistBuddy -c "Add :NSMicrophoneUsageDescription string 需要使用麦克风录音" "$INFO_PLIST" 2>/dev/null || \
                /usr/libexec/PlistBuddy -c "Set :NSMicrophoneUsageDescription 需要使用麦克风录音" "$INFO_PLIST"

                if [ -n "$AMAP_KEY" ]; then
                    /usr/libexec/PlistBuddy -c "Add :AMapServicesKey string $AMAP_KEY" "$INFO_PLIST" 2>/dev/null || \
                    /usr/libexec/PlistBuddy -c "Set :AMapServicesKey $AMAP_KEY" "$INFO_PLIST"
                    echo "AMap key injected"
                fi

                if [ -n "$WECHAT_APP_ID" ]; then
                    /usr/libexec/PlistBuddy -c "Add :WXAppID string $WECHAT_APP_ID" "$INFO_PLIST" 2>/dev/null || \
                    /usr/libexec/PlistBuddy -c "Set :WXAppID $WECHAT_APP_ID" "$INFO_PLIST"
                    /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$INFO_PLIST" 2>/dev/null || true
                    /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$INFO_PLIST" 2>/dev/null || true
                    /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string $WECHAT_APP_ID" "$INFO_PLIST" 2>/dev/null || true
                    echo "WeChat AppID injected"
                fi

                echo "=== Info.plist updated ==="

            - name: Build unsigned IPA
              script: |
                set -e
                EXPORT_DIR="$CM_BUILD_DIR/export"
                ARCHIVE_PATH="$CM_BUILD_DIR/build.xcarchive"
                mkdir -p "$EXPORT_DIR"

                echo "=== Archiving ==="
                xcodebuild archive \
                    -project "$XCODE_PROJECT" \
                    -scheme "$XCODE_SCHEME" \
                    -configuration "$CONFIGURATION" \
                    -archivePath "$ARCHIVE_PATH" \
                    -sdk iphoneos \
                    CODE_SIGNING_ALLOWED=NO \
                    CODE_SIGNING_REQUIRED=NO \
                    CODE_SIGN_IDENTITY="" \
                    2>&1 | tee /tmp/archive.log

                APP_PATH=$(find "$ARCHIVE_PATH" -name "*.app" -maxdepth 5 | head -1)
                if [ -z "$APP_PATH" ]; then
                    echo "ERROR: Cannot find .app in archive"
                    cat /tmp/archive.log
                    exit 1
                fi
                echo "Found app: $APP_PATH"

                APP_NAME=$(basename "$APP_PATH" .app)
                mkdir -p "$EXPORT_DIR/Payload"
                cp -R "$APP_PATH" "$EXPORT_DIR/Payload/"

                cd "$EXPORT_DIR"
                zip -qr "${APP_NAME}.ipa" Payload/
                cd -

                echo "=== IPA generated ==="
                ls -lh "$EXPORT_DIR/${APP_NAME}.ipa"

        artifacts:
            - $CM_BUILD_DIR/export/*.ipa
            - /tmp/cocos-build.log
            - /tmp/archive.log
